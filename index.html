<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 케미 진단 — 나와 AI, 우리 사이 케미 몇 점?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root {
    --bg:        #FFE9EF;
    --bg-2:      #FFF4F2;
    --card:      #FFFFFF;
    --ink:       #3A2230;
    --ink-soft:  #9A7783;
    --ink-faint: #C4A9B3;
    --line:      #FBDCE4;
    --line-2:    #F2C8D4;

    --pink:      #FF3D77;
    --pink-deep: #E51E63;
    --coral:     #FF8A5B;
    --pink-tint: #FFEDF3;
    --pink-tint2:#FFE0EB;

    --grad:      linear-gradient(135deg, #FF5C8A 0%, #FF8A5B 100%);
    --grad-soft: linear-gradient(135deg, #FFE3EC 0%, #FFE9E2 100%);

    --shadow-sm: 0 2px 10px rgba(255,61,119,.10);
    --shadow:    0 14px 40px -12px rgba(229,30,99,.30);
    --shadow-lg: 0 30px 70px -20px rgba(229,30,99,.42);

    --r-lg: 30px;
    --r-md: 20px;
    --r-sm: 16px;

    --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(900px 600px at 12% -8%, #FFD7E4 0%, transparent 55%),
      radial-gradient(900px 600px at 95% 8%, #FFE3D4 0%, transparent 50%),
      radial-gradient(1200px 800px at 50% 120%, #FFD2E2 0%, transparent 60%),
      var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #root {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 44px 24px;
  }
  @media (max-width: 560px) { #root { padding: 22px 14px; } }

  /* floating hearts background */
  .bg-hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-hearts .h {
    position: absolute;
    color: rgba(255,93,138,.16);
    font-size: 28px;
    animation: floatUp linear infinite;
    will-change: transform, opacity;
  }
  @keyframes floatUp {
    0%   { transform: translateY(20px) rotate(-8deg) scale(.8); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translateY(-110vh) rotate(12deg) scale(1.1); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-hearts { display: none; }
    * { animation-duration: .001ms !important; }
  }

  .stage {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .shell {
    width: 100%;
    max-width: 600px;
  }

  /* ---------- progress / gauge ---------- */
  .topbar { margin-bottom: 22px; }
  .topbar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .topbar-brand { display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: -.02em; color: var(--pink-deep); font-size: 15px; }
  .topbar-brand .mini-heart { font-size: 15px; }
  .topbar-count { margin-left: auto; font-weight: 700; font-size: 14px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .topbar-count b { color: var(--pink-deep); }

  .gauge {
    height: 12px;
    border-radius: 999px;
    background: #FFD9E4;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 1px 3px rgba(229,30,99,.12);
  }
  .gauge-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--grad);
    transition: width .5s cubic-bezier(.22,1,.36,1);
    box-shadow: 0 0 12px rgba(255,93,138,.55);
  }

  /* ---------- card ---------- */
  .card {
    background: var(--card);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    padding: 40px 40px 32px;
    position: relative;
  }
  .screen-anim { animation: cardIn .5s cubic-bezier(.22,1,.36,1) both; }
  @keyframes cardIn {
    from { transform: translateY(18px) scale(.985); }
    to   { transform: none; }
  }
  /* gentle fade that NEVER leaves content hidden if the timeline is frozen */
  .screen-anim { opacity: 1; }

  .part-pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--pink-tint); color: var(--pink-deep);
    font-weight: 800; font-size: 12.5px; letter-spacing: .02em;
    padding: 7px 14px; border-radius: 999px;
    border: 1.5px solid var(--line-2);
  }
  .part-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); }
  .key-tag {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--coral); font-weight: 800; font-size: 12.5px;
    margin-left: 8px;
  }

  .q-head { margin: 18px 0 26px; }
  .q-text {
    font-size: 27px; font-weight: 800; line-height: 1.32;
    letter-spacing: -.025em; margin: 0; text-wrap: pretty;
  }
  .q-note {
    margin: 12px 0 0; font-size: 14.5px; color: var(--ink-soft);
    line-height: 1.5; font-weight: 500;
  }

  /* ---------- options ---------- */
  .opts { display: flex; flex-direction: column; gap: 12px; }
  .opt {
    display: flex; align-items: center; gap: 14px;
    text-align: left;
    background: #FFF;
    border: 2px solid var(--line);
    border-radius: var(--r-md);
    padding: 17px 18px;
    font: inherit; color: var(--ink);
    font-size: 16px; font-weight: 600; line-height: 1.4;
    cursor: pointer;
    transition: border-color .16s, background .16s, transform .12s, box-shadow .16s;
  }
  .opt:hover { border-color: var(--line-2); background: var(--bg-2); transform: translateY(-1px); }
  .opt:active { transform: translateY(0) scale(.995); }
  .opt .num {
    flex: none; width: 30px; height: 30px; border-radius: 50%;
    display: grid; place-items: center;
    background: var(--pink-tint); color: var(--pink-deep);
    font-weight: 800; font-size: 14px;
    border: 1.5px solid var(--line-2);
    transition: all .16s;
  }
  .opt .lbl { flex: 1; }
  .opt .tick { flex: none; width: 22px; height: 22px; opacity: 0; transition: opacity .16s, transform .16s; transform: scale(.6); }
  .opt.sel {
    border-color: var(--pink);
    background: var(--pink-tint);
    box-shadow: 0 8px 22px -10px rgba(229,30,99,.45);
  }
  .opt.sel .num { background: var(--grad); color: #fff; border-color: transparent; }
  .opt.sel .tick { opacity: 1; transform: scale(1); }

  /* checkbox style for multi */
  .opt.multi .num { border-radius: 9px; }
  .opt.multi.sel .num { border-radius: 9px; }

  .other-input {
    margin-top: 2px;
    width: 100%;
    border: 2px solid var(--line-2);
    border-radius: var(--r-sm);
    padding: 14px 16px;
    font: inherit; font-size: 15.5px; font-weight: 600;
    color: var(--ink);
    background: #FFF;
    transition: border-color .16s, box-shadow .16s;
  }
  .other-input::placeholder { color: var(--ink-faint); font-weight: 500; }
  .other-input:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 4px var(--pink-tint); }

  /* ---------- number (Q3) ---------- */
  .num-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 6px 0 8px; }
  .num-field {
    display: flex; align-items: baseline; gap: 10px;
    background: var(--pink-tint); border: 2px solid var(--line-2);
    border-radius: var(--r-md); padding: 22px 30px;
    transition: border-color .16s, box-shadow .16s;
  }
  .num-field:focus-within { border-color: var(--pink); box-shadow: 0 0 0 5px var(--pink-tint2); }
  .num-field input {
    width: 130px; border: none; background: transparent;
    font: inherit; font-weight: 800; font-size: 56px; letter-spacing: -.04em;
    color: var(--pink-deep); text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .num-field input:focus { outline: none; }
  .num-field input::-webkit-outer-spin-button,
  .num-field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .num-field .unit { font-weight: 800; font-size: 30px; color: var(--pink); }
  .num-ticks { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  .num-tick { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); background: var(--bg-2); border: 1.5px solid var(--line); padding: 6px 11px; border-radius: 999px; transition: all .16s; }
  .num-tick.on { background: var(--grad); color: #fff; border-color: transparent; transform: scale(1.04); }

  /* ---------- buttons ---------- */
  .actions { display: flex; align-items: center; gap: 12px; margin-top: 26px; }
  .btn {
    font: inherit; font-weight: 800; font-size: 16.5px;
    border-radius: 999px; border: none; cursor: pointer;
    padding: 16px 26px;
    transition: transform .14s, box-shadow .16s, opacity .16s, background .16s;
  }
  .btn-primary {
    background: var(--grad); color: #fff;
    box-shadow: var(--shadow);
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { background: #F4C6D4; color: #fff; box-shadow: none; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent; color: var(--ink-soft);
    border: 2px solid var(--line); padding: 14px 20px;
  }
  .btn-ghost:hover { border-color: var(--line-2); color: var(--ink); background: var(--bg-2); }

  .skip-hint { text-align: center; margin-top: 14px; font-size: 13px; color: var(--ink-faint); font-weight: 600; }
  .kbd { display: inline-block; min-width: 20px; padding: 1px 6px; border-radius: 6px; background: #fff; border: 1.5px solid var(--line-2); color: var(--ink-soft); font-weight: 800; font-size: 12px; margin: 0 1px; }

  /* ---------- intro ---------- */
  .intro { text-align: center; padding: 52px 44px 40px; }
  .intro .badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--pink-tint); border: 1.5px solid var(--line-2);
    color: var(--pink-deep); font-weight: 800; font-size: 13px;
    padding: 8px 16px; border-radius: 999px; margin-bottom: 26px;
  }
  .intro .big-heart {
    font-size: 76px; line-height: 1; margin-bottom: 8px;
    filter: drop-shadow(0 12px 22px rgba(229,30,99,.35));
    animation: beat 1.6s ease-in-out infinite;
  }
  @keyframes beat { 0%,100% { transform: scale(1);} 14% { transform: scale(1.16);} 28% { transform: scale(1);} 42% { transform: scale(1.1);} 56% { transform: scale(1);} }
  .intro h1 {
    font-size: 38px; font-weight: 900; letter-spacing: -.035em;
    line-height: 1.22; margin: 6px 0 0; white-space: pre-line;
    background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .intro .sub { margin: 18px auto 0; font-size: 16.5px; color: var(--ink-soft); font-weight: 600; line-height: 1.6; max-width: 24em; }
  .intro .meta { display: flex; gap: 10px; justify-content: center; margin: 26px 0 30px; flex-wrap: wrap; }
  .intro .meta > span { background: #fff; border: 1.5px solid var(--line); color: var(--ink-soft); font-weight: 700; font-size: 13.5px; padding: 8px 16px; border-radius: 999px; box-shadow: var(--shadow-sm); display: inline-flex; align-items: center; gap: 6px; }
  .intro .start-btn { width: 100%; }

  /* ---------- info (name/dept) ---------- */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-weight: 800; font-size: 14.5px; margin-bottom: 9px; color: var(--ink); }
  .field label .req { color: var(--pink); margin-left: 3px; }
  .field input {
    width: 100%; border: 2px solid var(--line);
    border-radius: var(--r-md); padding: 16px 18px;
    font: inherit; font-size: 16.5px; font-weight: 600; color: var(--ink);
    background: #FFF; transition: border-color .16s, box-shadow .16s;
  }
  .field input::placeholder { color: var(--ink-faint); font-weight: 500; }
  .field input:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 4px var(--pink-tint); }

  /* ---------- result ---------- */
  .result { text-align: center; padding: 46px 40px 36px; }
  .result .for-who { font-size: 15px; font-weight: 700; color: var(--ink-soft); margin-bottom: 4px; }
  .result .lead { font-size: 16px; font-weight: 700; color: var(--pink-deep); margin: 0 0 4px; }
  .ring-wrap { position: relative; width: 230px; height: 230px; margin: 16px auto 6px; }
  .ring-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num .pct { font-size: 64px; font-weight: 900; letter-spacing: -.04em; line-height: 1; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; font-variant-numeric: tabular-nums; }
  .ring-num .pct .sign { font-size: 32px; }
  .ring-num .cap { font-size: 13.5px; font-weight: 800; color: var(--ink-soft); margin-top: 6px; letter-spacing: .04em; }
  .result-hearts { font-size: 22px; letter-spacing: 4px; margin: 6px 0 2px; }
  .result h2 { font-size: 33px; font-weight: 900; letter-spacing: -.03em; margin: 12px 0 0; line-height: 1.2; }
  .result .desc { font-size: 16.5px; color: var(--ink-soft); font-weight: 600; line-height: 1.62; margin: 14px auto 0; max-width: 26em; white-space: pre-line; text-wrap: pretty; }
  .result .actions { margin-top: 30px; flex-direction: column; }
  .result .actions .btn { width: 100%; }
  .result .partbar { display: none; }

  .encourage {
    margin-top: 30px;
    background: var(--grad-soft);
    border: 1.5px solid var(--line-2);
    border-radius: var(--r-md);
    padding: 22px 24px;
    text-align: center;
  }
  .enc-title { margin: 0 0 8px; font-weight: 900; font-size: 17px; color: var(--pink-deep); letter-spacing: -.02em; }
  .enc-body { margin: 0; font-size: 15px; font-weight: 600; line-height: 1.66; color: var(--ink-soft); text-wrap: pretty; }
  .enc-body b { color: var(--ink); font-weight: 800; }

  @media (max-width: 560px) {
    .stage { padding: 22px 14px; }
    .card { padding: 30px 22px 26px; border-radius: 26px; }
    .intro { padding: 40px 24px 30px; }
    .result { padding: 36px 22px 28px; }
    .q-text { font-size: 23px; }
    .intro h1 { font-size: 30px; }
    .num-field input { font-size: 44px; width: 100px; }
    .result h2 { font-size: 27px; }
  }
</style>
</head>
<body>
  <div class="bg-hearts" id="bgHearts" aria-hidden="true"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
/* AI 케미 진단 — 설문 데이터 (엑셀 'AI케미진단_재미버전_최종' 기반) */
window.SURVEY = {
  title: "AI 케미 진단",
  tagline: "나와 AI, 우리 사이\n케미 몇 점일까?",
  subtitle: "솔직하게 고를수록 정확한 케미 점수가 나와요.",
  meta: ["총 13문항", "약 4분"],

  parts: [
    { id: 1, label: "PART 1", title: "AI, 나한테 익숙한 존재가 됐을까?" },
    { id: 2, label: "PART 2", title: "AI한테 진짜 일을 맡겨본 적 있을까?" },
    { id: 3, label: "PART 3", title: "나는 AI를 내 편으로 만드는 사람일까?" },
  ],

  questions: [
    { code: "Q1", part: 1, type: "single", scored: true,
      q: "AI랑 얼마나 자주 만나고 있어요?",
      note: "지금 우리 만남 빈도를 솔직하게 골라주세요",
      options: [
        "한 달에 한두 번, 거의 연락 없는 사이",
        "일주일에 한두 번, 가끔 생각날 때만 연락함",
        "거의 매일 만남, 꽤 친한 사이",
        "매일 붙어있음, 없으면 허전한 사이",
      ] },

    { code: "Q2", part: 1, type: "single", scored: true,
      q: "AI한테 먼저 연락하게 되는 순간은요?",
      note: "가장 가까운 상황을 골라주세요",
      options: [
        "솔직히 연락할 생각을 별로 안 함",
        "막히거나 귀찮은 게 생겼을 때만 연락함",
        "이런 업무다 싶으면 자연스럽게 먼저 찾게 됨",
        "출근하면 일단 켜고 시작, 자동으로 같이 있음",
      ] },

    { code: "Q3", part: 1, type: "number", scored: true, key: true,
      q: "하루 중 AI랑 함께하는 시간은 전체의 몇 %예요?",
      note: "업무 시간 100% 기준으로 솔직하게 숫자로 써주세요",
      hint: "0~5% · 6~15% · 16~30% · 31% 이상 — 비중이 높을수록 케미 점수도 올라가요",
      unit: "%" },

    { code: "Q3-1", part: 1, type: "multi", scored: false,
      q: "지금 연락 중인 AI, 누구누구예요?",
      note: "복수 선택 가능 · 점수에는 반영되지 않아요",
      options: [
        "ChatGPT (OpenAI)",
        "Claude (Anthropic)",
        "Gemini (Google)",
        "Copilot (Microsoft)",
        "Perplexity",
        "Wrtn / 뤼튼",
        "기타",
      ],
      otherIndex: 6 },

    { code: "Q4", part: 2, type: "single", scored: true,
      q: "AI한테 주로 어떤 부탁을 하고 있어요?",
      note: "요즘 가장 자주 하는 부탁을 골라주세요",
      options: [
        "\u201c이거 찾아봐줘\u201d \u201c이거 뭔지 설명해줘\u201d — 심부름 수준",
        "\u201c이거 요약해줘\u201d \u201c이 글 번역해줘\u201d — 내 일 대신 해주기",
        "\u201c이 기획 같이 다듬어줘\u201d \u201c이 데이터 분석해줘\u201d — 같이 고민하기",
        "\u201c이 반복 업무 네가 알아서 해줘\u201d — 믿고 맡기기",
      ] },

    { code: "Q5", part: 2, type: "single", scored: true,
      q: "AI가 해준 걸 실제로 얼마나 쓰고 있어요?",
      options: [
        "그냥 읽어보고 참고만 함, 결국 내가 다 씀",
        "괜찮은 부분만 골라서 일부 가져다 씀",
        "꽤 자주 그대로, 또는 조금만 손봐서 씀",
        "AI가 뼈대 잡고 내가 마무리하는 게 루틴이 됨",
      ] },

    { code: "Q6", part: 2, type: "single", scored: true, key: true,
      q: "AI 덕분에 칼퇴한 적 있어요?",
      note: "AI 쓰고 나서 체감하는 시간 절약 정도를 골라주세요",
      options: [
        "솔직히 모르겠음, 별 차이를 못 느낌",
        "조금 편해진 것 같긴 한데 극적이진 않음",
        "확실히 특정 업무는 눈에 띄게 빨라짐",
        "AI 없이 이 업무량? 상상도 못 함",
      ] },

</script>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const SURVEY = window.SURVEY;
const LS_KEY = "aichemi_state_v1";
const LS_SUBMITS = "aichemi_submissions_v1";

/* 응답 수집용 Google Apps Script 웹앱 URL.
   배포한 웹앱 주소를 따옴표 안에 붙여넣으면, 모든 응답이 구글 스프레드시트로 모입니다.
   (관리자는 스프레드시트에서 엑셀로 내려받기) */
const SUBMIT_ENDPOINT = "https://script.google.com/macros/s/AKfycbzBRmyi1Xq6RcxWY4VEjEKFoFy6nBwkj7tNF6yPdBNEsMPdBPmWVv-lxMyntGFoEaUYTg/exec";

/* ---------------- scoring helpers ---------------- */
function pctToScore(p) {
  const n = Number(p);
  if (!isFinite(n)) return 0;
  if (n <= 5) return 1;
  if (n <= 15) return 2;
  if (n <= 30) return 3;
  return 4;
}
function tickIndex(p) {
  const n = Number(p);
  if (p === "" || !isFinite(n)) return -1;
  if (n <= 5) return 0;
  if (n <= 15) return 1;
  if (n <= 30) return 2;
  return 3;
}
function scoreOf(q, ans) {
  if (!q.scored) return 0;
  if (q.type === "number") return pctToScore(ans);
  if (q.type === "single") return (typeof ans === "number") ? ans + 1 : 0;
  return 0;
}
function computeResult(answers) {
  const part = { 1: 0, 2: 0, 3: 0 };
  SURVEY.questions.forEach((q) => {
    if (q.scored) part[q.part] += scoreOf(q, answers[q.code]);
  });
  const total = part[1] + part[2] + part[3];
  const pct = Math.round((total / 48) * 100);
  const p1 = Math.round((part[1] / 12) * 100);
  const p2 = Math.round((part[2] / 16) * 100);
  const p3 = Math.round((part[3] / 20) * 100);
  const tier = SURVEY.results.find((r) => pct >= r.min && pct <= r.max) || SURVEY.results[0];
  return { total, pct, p1, p2, p3, part, tier };
}

/* ---------------- small UI bits ---------------- */
function Tick() {
  return (
    <svg className="tick" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="11" fill="#FF3D77" />
      <path d="M6 11.5l3.2 3.2L16 8" stroke="#fff" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function TopBar({ index, total }) {
  const pct = Math.round((index / total) * 100);
  return (
    <div className="topbar">
      <div className="topbar-row">
        <span className="topbar-brand"><span className="mini-heart">{"\u2665"}</span> AI 케미 진단</span>
        <span className="topbar-count"><b>{index}</b> / {total}</span>
      </div>
      <div className="gauge"><div className="gauge-fill" style={{ width: pct + "%" }} /></div>
    </div>
  );
}

/* ---------------- intro ---------------- */
function Intro({ onStart }) {
  return (
    <div className="shell">
      <div className="card intro screen-anim">
        <span className="badge">{"\u2665"} 사내 AI 활용 진단</span>
        <div className="big-heart">{"\uD83D\uDC98"}</div>
        <h1>{SURVEY.tagline}</h1>
        <p className="sub">{SURVEY.subtitle}<br />지금 나와 AI의 케미를 점수로 확인해 봐요.</p>
        <div className="meta">
          {SURVEY.meta.map((m, i) => <span key={i}>{m}</span>)}
          <span>{"\u2764"} 재미로 보는 진단</span>
        </div>
        <button className="btn btn-primary start-btn" onClick={onStart}>
          케미 진단 시작하기 {"\u2192"}
        </button>
      </div>
    </div>
  );
}

/* ---------------- question ---------------- */
function Question({ qIndex, total, answers, setAnswer, onNext, onPrev }) {
  const q = SURVEY.questions[qIndex];
  const part = SURVEY.parts.find((p) => p.id === q.part);
  const ans = answers[q.code];
  const otherKey = q.code + "__other";
  const advTimer = useRef(null);

  useEffect(() => () => clearTimeout(advTimer.current), []);

  const pickSingle = (i) => {
    setAnswer(q.code, i);
    clearTimeout(advTimer.current);
    advTimer.current = setTimeout(onNext, 320);
  };

  const toggleMulti = (i) => {
    const cur = Array.isArray(ans) ? ans.slice() : [];
    const at = cur.indexOf(i);
    if (at >= 0) cur.splice(at, 1); else cur.push(i);
    setAnswer(q.code, cur);
  };

  // can we proceed?
  let canNext = false;
  if (q.type === "single") canNext = typeof ans === "number";
  else if (q.type === "number") canNext = ans !== undefined && ans !== "" && isFinite(Number(ans)) && Number(ans) >= 0;
  else if (q.type === "multi") canNext = true; // info-only, optional

  // keyboard
  useEffect(() => {
    const h = (e) => {
      if (q.type === "single" && /^[1-4]$/.test(e.key)) {
        const i = parseInt(e.key, 10) - 1;
        if (i < q.options.length) pickSingle(i);
      } else if (e.key === "Enter" && q.type !== "single" && canNext) {
        onNext();
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [qIndex, ans, canNext]);

  const numTick = q.type === "number" ? tickIndex(ans === undefined ? "" : ans) : -1;

  return (
    <div className="shell">
      <TopBar index={qIndex} total={total} />
      <div className="card screen-anim" key={q.code}>
        <div>
          <span className="part-pill"><span className="dot" /> {part.label} · {part.title}</span>
          {q.key && <span className="key-tag">{"\u2665"} 핵심 케미 포인트</span>}
        </div>

        <div className="q-head">
          <p className="q-text">{q.code === "Q3-1" ? q.q : q.code + ". " + q.q}</p>
          {q.note && <p className="q-note">{q.note}</p>}
          {q.hint && <p className="q-note" style={{ color: "var(--coral)", fontWeight: 700 }}>{q.hint}</p>}
        </div>

        {q.type === "single" && (
          <div className="opts">
            {q.options.map((opt, i) => (
              <button key={i} className={"opt" + (ans === i ? " sel" : "")} onClick={() => pickSingle(i)}>
                <span className="num">{i + 1}</span>
                <span className="lbl">{opt}</span>
                <Tick />
              </button>
            ))}
          </div>
        )}

        {q.type === "multi" && (
          <div className="opts">
            {q.options.map((opt, i) => {
              const on = Array.isArray(ans) && ans.indexOf(i) >= 0;
              return (
                <React.Fragment key={i}>
                  <button className={"opt multi" + (on ? " sel" : "")} onClick={() => toggleMulti(i)}>
                    <span className="num">{on ? "\u2713" : ""}</span>
                    <span className="lbl">{opt}</span>
                  </button>
                  {q.otherIndex === i && on && (
                    <input
                      className="other-input"
                      placeholder="어떤 AI를 쓰는지 적어주세요"
                      value={answers[otherKey] || ""}
                      onChange={(e) => setAnswer(otherKey, e.target.value)}
                    />
                  )}
                </React.Fragment>
              );
            })}
          </div>
        )}

        {q.type === "number" && (
          <div className="num-wrap">
            <div className="num-field">
              <input
                type="number" min="0" max="100" inputMode="numeric"
                placeholder="0"
                value={ans === undefined ? "" : ans}
                autoFocus
                onChange={(e) => {
                  let v = e.target.value;
                  if (v === "") { setAnswer(q.code, ""); return; }
                  let n = Math.max(0, Math.min(100, Number(v)));
                  setAnswer(q.code, String(n));
                }}
                onKeyDown={(e) => { if (e.key === "Enter" && canNext) onNext(); }}
              />
              <span className="unit">%</span>
            </div>
            <div className="num-ticks">
              {["0~5%", "6~15%", "16~30%", "31%+"].map((t, i) => (
                <span key={i} className={"num-tick" + (numTick === i ? " on" : "")}>{t}</span>
              ))}
            </div>
          </div>
        )}

        <div className="actions">
          {qIndex > 0 && <button className="btn btn-ghost" onClick={onPrev}>{"\u2190"} 이전</button>}
          {q.type !== "single" && (
            <button className="btn btn-primary" onClick={onNext} disabled={!canNext}>
              {q.type === "multi" ? "다음으로" : "다음으로"} {"\u2192"}
            </button>
          )}
        </div>

        {q.type === "single" && (
          <p className="skip-hint">키보드 <span className="kbd">1</span><span className="kbd">2</span><span className="kbd">3</span><span className="kbd">4</span> 로도 선택할 수 있어요</p>
        )}
      </div>
    </div>
  );
}

/* ---------------- info (name / dept) ---------------- */
function InfoScreen({ info, setInfo, onSubmit, onPrev }) {
  const can = info.name.trim() && info.dept.trim();
  return (
    <div className="shell">
      <TopBar index={SURVEY.questions.length} total={SURVEY.questions.length} />
      <div className="card screen-anim">
        <span className="part-pill"><span className="dot" /> 마지막 단계</span>
        <div className="q-head">
          <p className="q-text">거의 다 왔어요!{"\u2728"}<br />결과를 받을 분의 정보를 알려주세요.</p>
          <p className="q-note">입력하신 정보는 진단 결과 집계용으로만 사용돼요.</p>
        </div>
        <div className="field">
          <label>이름 <span className="req">{"\u2665"}</span></label>
          <input
            value={info.name}
            placeholder="홍길동"
            onChange={(e) => setInfo({ ...info, name: e.target.value })}
            onKeyDown={(e) => { if (e.key === "Enter" && can) onSubmit(); }}
          />
        </div>
        <div className="field">
          <label>부서명 <span className="req">{"\u2665"}</span></label>
          <input
            value={info.dept}
            placeholder="예) 마케팅팀"
            onChange={(e) => setInfo({ ...info, dept: e.target.value })}
            onKeyDown={(e) => { if (e.key === "Enter" && can) onSubmit(); }}
          />
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={onPrev}>{"\u2190"} 이전</button>
          <button className="btn btn-primary" onClick={onSubmit} disabled={!can}>
            내 케미 점수 확인 {"\uD83D\uDC95"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- result ---------------- */
function ScoreRing({ pct }) {
  const R = 100, C = 2 * Math.PI * R;
  const [draw, setDraw] = useState(0);
  useEffect(() => { const t = setTimeout(() => setDraw(pct), 120); return () => clearTimeout(t); }, [pct]);
  return (
    <div className="ring-wrap">
      <svg width="230" height="230" viewBox="0 0 230 230">
        <defs>
          <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#FF5C8A" />
            <stop offset="100%" stopColor="#FF8A5B" />
          </linearGradient>
        </defs>
        <circle cx="115" cy="115" r={R} fill="none" stroke="#FFD9E4" strokeWidth="18" />
        <circle
          cx="115" cy="115" r={R} fill="none" stroke="url(#rg)" strokeWidth="18" strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={C - (C * draw) / 100}
          transform="rotate(-90 115 115)"
          style={{ transition: "stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1)" }}
        />
      </svg>
      <div className="ring-num">
        <div className="pct">{pct}<span className="sign">%</span></div>
        <div className="cap">종합 케미 점수</div>
      </div>
    </div>
  );
}

function Result({ info, answers }) {
  const r = computeResult(answers);
  const level = r.tier.emojiHeart || 1;
  return (
    <div className="shell">
      <div className="card result screen-anim">
        <p className="for-who">{info.dept} · {info.name} 님의 결과</p>
        <p className="lead">AI와 우리 사이, 케미는…</p>
        <ScoreRing pct={r.pct} />
        <div className="result-hearts">
          {[0, 1, 2, 3].map((i) => (
            <span key={i} style={{ color: i < level ? "#FF3D77" : "#FFD0DD" }}>{i < level ? "\u2665" : "\u2661"}</span>
          ))}
        </div>
        <h2>{r.tier.grade}</h2>
        <p className="desc">{r.tier.desc}</p>
        <div className="encourage">
          <p className="enc-title">{"\u2728"} 우리, 더 찰떡 케미가 될 수 있어요</p>
          <p className="enc-body">이번 <b>AX 교육</b>으로 AI와의 케미를 한 단계 더 끌어올려 보세요.<br />그리고 <b>AI 활용 공모전</b>에도 용기 내어 도전해 보세요! {"\uD83D\uDC95"}</p>
        </div>
      </div>
    </div>
  );
}

/* ---------------- 응답 기록 → Google 스프레드시트 전송 ---------------- */
function buildRecord(info, answers) {
  const r = computeResult(answers);
  const rec = {
    "제출시각": new Date().toLocaleString("ko-KR"),
    "이름": info.name,
    "부서명": info.dept,
  };
  SURVEY.questions.forEach((q) => {
    const a = answers[q.code];
    if (q.type === "single") {
      rec[q.code + " 응답"] = typeof a === "number" ? q.options[a] : "";
      rec[q.code + " 점수"] = typeof a === "number" ? a + 1 : "";
    } else if (q.type === "number") {
      rec[q.code + " (%)"] = a === undefined ? "" : a;
      rec[q.code + " 환산점수"] = pctToScore(a);
    } else if (q.type === "multi") {
      const sel = Array.isArray(a) ? a.map((i) => (
        q.otherIndex === i ? "기타: " + (answers[q.code + "__other"] || "") : q.options[i]
      )) : [];
      rec[q.code + " 사용 AI"] = sel.join(" / ");
    }
  });
  rec["PART1(%)"] = r.p1; rec["PART2(%)"] = r.p2; rec["PART3(%)"] = r.p3;
  rec["종합 케미 점수(%)"] = r.pct; rec["케미 등급"] = r.tier.grade;
  return rec;
}
function sendToSheet(rec) {
  if (!SUBMIT_ENDPOINT) return;
  try {
    fetch(SUBMIT_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(rec),
    });
  } catch (e) {}
}

/* ---------------- app ---------------- */
function App() {
  const [state, setState] = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem(LS_KEY));
      if (s && typeof s.step !== "undefined") return s;
    } catch (e) {}
    return { step: "intro", answers: {}, info: { name: "", dept: "" } };
  });

  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }, [state]);

  const setAnswer = useCallback((code, val) => {
    setState((s) => ({ ...s, answers: { ...s.answers, [code]: val } }));
  }, []);
  const setInfo = useCallback((info) => setState((s) => ({ ...s, info })), []);
  const go = useCallback((step) => {
    setState((s) => ({ ...s, step }));
    window.scrollTo({ top: 0 });
  }, []);

  const total = SURVEY.questions.length;
  const step = state.step;

  if (step === "intro") return <Intro onStart={() => go(0)} />;

  if (typeof step === "number") {
    const goNext = () => go(step + 1 >= total ? "info" : step + 1);
    const goPrev = () => go(step - 1 < 0 ? "intro" : step - 1);
    return (
      <Question
        qIndex={step} total={total}
        answers={state.answers} setAnswer={setAnswer}
        onNext={goNext} onPrev={goPrev}
      />
    );
  }

  if (step === "info") {
    const submit = () => {
      // 구글 스프레드시트로 전송 (관리자 수집용)
      sendToSheet(buildRecord(state.info, state.answers));
      // 로컬 백업 보관
      try {
        const arr = JSON.parse(localStorage.getItem(LS_SUBMITS) || "[]");
        const r = computeResult(state.answers);
        arr.push({ at: new Date().toISOString(), info: state.info, answers: state.answers, pct: r.pct, grade: r.tier.grade });
        localStorage.setItem(LS_SUBMITS, JSON.stringify(arr));
      } catch (e) {}
      go("result");
    };
    return <InfoScreen info={state.info} setInfo={setInfo} onSubmit={submit} onPrev={() => go(total - 1)} />;
  }

  if (step === "result") {
    return <Result info={state.info} answers={state.answers} />;
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

  <script>
    // ambient floating hearts
    (function () {
      var box = document.getElementById('bgHearts');
      if (!box) return;
      var glyphs = ['\u2665', '\u2661', '\u2764'];
      var n = 14;
      for (var i = 0; i < n; i++) {
        var s = document.createElement('span');
        s.className = 'h';
        s.textContent = glyphs[i % glyphs.length];
        s.style.left = (Math.random() * 100) + '%';
        var size = 16 + Math.random() * 30;
        s.style.fontSize = size + 'px';
        var dur = 14 + Math.random() * 16;
        s.style.animationDuration = dur + 's';
        s.style.animationDelay = (-Math.random() * dur) + 's';
        s.style.opacity = (0.5 + Math.random() * 0.5);
        box.appendChild(s);
      }
    })();
  </script>
</body>
